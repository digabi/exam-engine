name: Update Snapshots

on:
  workflow_dispatch:

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.SNAPSHOT_UPDATE_GITHUB_APP_ID }}
          private-key: ${{ secrets.SNAPSHOT_UPDATE_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Node.js Setup
        uses: ./.github/actions/node-setup

      - name: Restore puppeteer cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm rebuild full-icu

      - name: Update Jest Snapshots
        run: npm run test-jest -- --ci -u

      - name: Commit and push to branch
        if: github.ref_name != 'master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update snapshots"
            git push
          fi

      - name: Create Pull Request
        if: github.ref_name == 'master'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: 'Update snapshots'
          title: 'Update snapshots'
          branch: update-snapshots-${{ github.run_id }}
          delete-branch: true
